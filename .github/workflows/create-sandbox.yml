name: Create Sandbox Environment

on:
  push:
    branches:
      - 'feature/**'
      - 'dev/**'
      - 'sandbox/**'

jobs:
  create-sandbox:
    name: Create sandbox for ${{ github.ref_name }}
    runs-on: ubuntu-latest

    env:
      PINGONE_ROOT_DOMAIN: pingone.ca
      PINGCLI_SERVICE_PINGONE_ENABLED: "true"
      PINGCLI_SERVICE_PINGONE_AUTHENTICATION_CLIENTCREDENTIALS_CLIENTID: ${{ secrets.PINGCLI_PINGONE_CLIENT_CREDENTIALS_CLIENT_ID }}
      PINGCLI_SERVICE_PINGONE_AUTHENTICATION_CLIENTCREDENTIALS_CLIENTSECRET: ${{ secrets.PINGCLI_PINGONE_CLIENT_CREDENTIALS_CLIENT_SECRET }}
      PINGCLI_SERVICE_PINGONE_ENDPOINT_ENVIRONMENTID: ${{ vars.PINGONE_ADMINISTRATORS_ENV_ID }}
      PINGCLI_SERVICE_PINGONE_ENDPOINT_ROOTDOMAIN: pingone.ca
      PINGCLI_SERVICE_PINGONE_AUTHENTICATION_GRANTTYPE: client_credentials

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ping CLI
        run: |
          curl -fsSL -o /tmp/pingcli.deb \
            https://github.com/pingidentity/pingcli/releases/download/v1.1.0/pingcli_1.1.0_linux_amd64.deb
          sudo dpkg -i /tmp/pingcli.deb
          pingcli --version

      - name: Verify authentication
        run: pingcli auth status --no-color

      - name: Derive environment name from branch
        id: env-name
        run: |
          # Replace / with - and strip any characters invalid for PingOne env names
          NAME=$(echo "${{ github.ref_name }}" | sed 's|/|-|g' | tr -cd '[:alnum:]-_')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          # ENV_NAME is the overlay key — use "sandbox" for all sandbox branches
          echo "env_name=sandbox" >> "$GITHUB_OUTPUT"

      - name: Create or update sandbox environment
        id: create-env
        run: |
          NAME="${{ steps.env-name.outputs.name }}"

          # Inject name into the golden config environment template
          jq --arg name "$NAME" '. + {name: $name}' ping-config/environment.json \
            > /tmp/sandbox-env-final.json

          OUTPUT=$(pingcli pingone environments apply \
            --from-file /tmp/sandbox-env-final.json \
            --output-format json \
            --no-color)

          ENV_ID=$(echo "$OUTPUT" | jq -r '.data.id // .id')
          echo "env_id=$ENV_ID" >> "$GITHUB_OUTPUT"

      - name: Apply resources
        run: |
          ENV_ID="${{ steps.create-env.outputs.env_id }}"
          ENV_NAME="${{ steps.env-name.outputs.env_name }}"

          RESOURCE_TYPES=(populations password-policies identity-providers notification-policies sign-on-policies groups applications)

          for type in "${RESOURCE_TYPES[@]}"; do
            [ -d "ping-config/$type" ] || continue
            for f in ping-config/$type/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              override="ping-config/overrides/${ENV_NAME}/$type/$fname"
              if [ -f "$override" ]; then
                jq -s '.[0] * .[1]' "$f" "$override" > /tmp/merged.json
                INPUT="/tmp/merged.json"
              else
                INPUT="$f"
              fi
              pingcli --detailed-exitcode pingone "$type" apply \
                --environment-id "$ENV_ID" \
                --from-file "$INPUT" \
                --no-color
            done
          done

      - name: Grant IAM Team Environment Admin access to sandbox
        run: |
          ENV_ID="${{ steps.create-env.outputs.env_id }}"
          ROLE_ID=$(jq -r '.role.id' ping-config/sandbox/group-role-assignment.json)
          ADMINS_ENV_ID="${{ vars.PINGONE_ADMINISTRATORS_ENV_ID }}"
          GROUP_ID="9000f404-7204-49a2-bf9f-d91e6f960e0d"

          # Check if the role is already assigned to this scope (idempotent)
          EXISTING=$(pingcli pingone groups group-role-assignments list \
            --environment-id "$ADMINS_ENV_ID" \
            --group-id "$GROUP_ID" \
            --output-format json \
            --no-color \
            | jq -r --arg role "$ROLE_ID" --arg env "$ENV_ID" \
              '.data[] | select(.role.id == $role and .scope.id == $env) | .id')

          if [ -n "$EXISTING" ]; then
            echo "Role already assigned (id=$EXISTING), skipping."
          else
            jq --arg env_id "$ENV_ID" '.scope.id = $env_id' \
              ping-config/sandbox/group-role-assignment.json \
              > /tmp/role-assignment.json
            pingcli pingone groups group-role-assignments create \
              --environment-id "$ADMINS_ENV_ID" \
              --group-id "$GROUP_ID" \
              --from-file /tmp/role-assignment.json \
              --no-color
          fi

      - name: Print sandbox details
        run: |
          ENV_ID="${{ steps.create-env.outputs.env_id }}"
          echo "SANDBOX_NAME=${{ steps.env-name.outputs.name }}"
          echo "SANDBOX_ENV_ID=$ENV_ID"
          ADMIN_ENV_ID="${{ vars.PINGONE_ADMINISTRATORS_ENV_ID }}"
          echo "SANDBOX_CONSOLE_URL=https://console.${PINGONE_ROOT_DOMAIN}/index.html?env=${ADMIN_ENV_ID}#/${ENV_ID}/dashboard"
