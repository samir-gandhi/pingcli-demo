name: Deploy Ping Identity Configuration

on:
  push:
    branches: [main]
    paths:
      - 'ping-config/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment profile
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest

    env:
      # Ping CLI reads these automatically — no config file needed in the runner
      PINGCLI_SERVICE_PINGONE_ENABLED: "true"
      PINGCLI_SERVICE_PINGONE_AUTHENTICATION_CLIENTCREDENTIALS_CLIENTID: ${{ secrets.PINGCLI_PINGONE_CLIENT_CREDENTIALS_CLIENT_ID }}
      PINGCLI_SERVICE_PINGONE_AUTHENTICATION_CLIENTCREDENTIALS_CLIENTSECRET: ${{ secrets.PINGCLI_PINGONE_CLIENT_CREDENTIALS_CLIENT_SECRET }}
      PINGCLI_SERVICE_PINGONE_ENDPOINT_ENVIRONMENTID: ${{ secrets.PINGCLI_PINGONE_ENVIRONMENT_ID }}
      PINGCLI_SERVICE_PINGONE_ENDPOINT_ROOTDOMAIN: ${{ secrets.PINGCLI_PINGONE_ROOT_DOMAIN }}
      PINGCLI_SERVICE_PINGONE_AUTHENTICATION_GRANTTYPE: client_credentials

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ping CLI
        run: |
          curl -fsSL -o /tmp/pingcli.deb \
            https://github.com/pingidentity/pingcli/releases/download/v1.1.0/pingcli_1.1.0_linux_amd64.deb
          sudo dpkg -i /tmp/pingcli.deb
          pingcli --version

      - name: Verify authentication
        run: pingcli auth status --no-color

      # ── Drift check: read current state before applying changes ────────────

      - name: List current applications
        run: |
          pingcli pingone applications list \
            --environment-id "$PINGCLI_SERVICE_PINGONE_ENDPOINT_ENVIRONMENTID" \
            --output-format json \
            --query 'data[].{name:name, enabled:enabled, protocol:protocol}' \
            --no-color

      # ── Apply resources in dependency order ────────────────────────────────

      - name: Apply resources
        run: |
          ENV_ID="$PINGCLI_SERVICE_PINGONE_ENDPOINT_ENVIRONMENTID"
          ENV_NAME="${{ github.event.inputs.environment || 'staging' }}"

          RESOURCE_TYPES=(populations password-policies identity-providers notification-policies sign-on-policies groups applications)

          for type in "${RESOURCE_TYPES[@]}"; do
            [ -d "ping-config/$type" ] || continue
            for f in ping-config/$type/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              override="ping-config/overrides/${ENV_NAME}/$type/$fname"
              if [ -f "$override" ]; then
                jq -s '.[0] * .[1]' "$f" "$override" > /tmp/merged.json
                INPUT="/tmp/merged.json"
              else
                INPUT="$f"
              fi
              pingcli --detailed-exitcode pingone "$type" apply \
                --environment-id "$ENV_ID" \
                --from-file "$INPUT" \
                --no-color
            done
          done

      # ── Post-deploy validation ─────────────────────────────────────────────

      - name: Confirm deployed applications
        run: |
          pingcli pingone applications list \
            --environment-id "$PINGCLI_SERVICE_PINGONE_ENDPOINT_ENVIRONMENTID" \
            --output-format json \
            --query 'data[?enabled].{name:name, id:id}' \
            --no-color

      - name: Confirm sign-on policies
        run: |
          pingcli pingone sign-on-policies list \
            --environment-id "$PINGCLI_SERVICE_PINGONE_ENDPOINT_ENVIRONMENTID" \
            --output-format json \
            --query 'data[].name' \
            --no-color

      # ── Raw API escape hatch for resources not yet in the CLI ─────────────

      - name: Check license limits
        run: |
          pingcli pingone api \
            --http-method GET \
            --output-format json \
            --no-color \
            "licenses"
